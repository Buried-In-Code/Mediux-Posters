version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      github_actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily
    groups:
      python:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: daily
    groups:
      pre-commit:
        patterns:
          - "*"
    cooldown:
      default-days: 7
