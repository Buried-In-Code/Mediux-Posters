name: Testing
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
  push:
    branches:
      - main
    paths-ignore:
      - docs/**

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
permissions: {}

jobs:
  pytest:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: pdm-project/setup-pdm@v4.5
        with:
          python-version: ${{ matrix.python-version }}
          cache: true
          cache-dependency-path: pylock.toml
      - name: Install project
        run: pdm install -G tests
      - name: Run tests
        env:
          MEDIUX__BASE_URL: ${{ secrets.MEDIUX__BASE_URL }}
          MEDIUX__TOKEN: ${{ secrets.MEDIUX__TOKEN }}
        run: pdm run pytest

  check:
    if: always()
    needs:
      - pytest

    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
